version: '3.8'

services:
  # PostgreSQL
  postgres:
    image: postgres:15
    container_name: jqeval-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: jqeval
      POSTGRES_USER: jqeval
      POSTGRES_PASSWORD: jqeval123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jqeval -d jqeval"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - jqeval-network

  # Redis (缓存 + Celery队列)
  redis:
    image: redis:7-alpine
    container_name: jqeval-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass jqeval123 --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "jqeval123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - jqeval-network

  # MinIO (文件存储 - 应用层)
  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: jqeval-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped
    networks:
      - jqeval-network

  # Milvus - etcd
  etcd:
    container_name: jqeval-milvus-etcd
    image: quay.io/coreos/etcd:v3.5.18
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls=http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped
    networks:
      - jqeval-network

  # Milvus - MinIO (Milvus内部使用)
  milvus-minio:
    container_name: jqeval-milvus-minio
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - milvus_minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped
    networks:
      - jqeval-network

  # Milvus Standalone (修复后的配置)
  standalone:
    container_name: jqeval-milvus
    image: milvusdb/milvus:v2.5.10  # 推荐使用稳定版本 v2.5.10 或 v2.6.13
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
      # 如需开启认证，取消下面注释并创建 user.yaml
      # COMMON_SECURITY_AUTHORIZATIONENABLED: "true"
    volumes:
      - milvus_data:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - etcd
      - milvus-minio
    restart: unless-stopped
    networks:
      - jqeval-network

volumes:
  postgres_data:
  redis_data:
  minio_data:
  etcd_data:
  milvus_minio_data:
  milvus_data:

networks:
  jqeval-network:
    name: jqeval-network
    driver: bridge